<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shared One Piece TCG Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; padding: 20px; }
        h1 { text-align: center; color: #ffcc00; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 25px; font-size: 0.95em; }
        
        .controls-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
        input { flex-grow: 1; min-width: 250px; padding: 12px; box-sizing: border-box; background: #222; color: white; border: 1px solid #444; border-radius: 5px; font-size: 1em; }
        
        .btn-group { display: flex; gap: 8px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9em; transition: 0.2s; }
        button:hover { background: #444; border-color: #ffcc00; }
        button.active { background: #ffcc00; color: black; border-color: #ffcc00; }
        
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #252525; color: #ffcc00; }
        tr:hover { background-color: #262626; }
        tr.has-items { background-color: #162923; }
        tr.has-items:hover { background-color: #1b362d; }
        
        .card-img { width: 80px; border-radius: 5px; transition: transform 0.2s; cursor: pointer; }
        .card-img:hover { transform: scale(3.2); position: relative; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.7); }
        
        .price-list { font-size: 0.9em; color: #ccc; list-style: none; padding: 0; margin: 0; }
        .price-list strong { color: #00ffcc; }
        .tcg-link { color: #00ffcc; text-decoration: none; font-weight: bold; font-size: 0.9em; }
        .tcg-link:hover { text-decoration: underline; }
        
        .qty-controls { display: flex; align-items: center; gap: 8px; background: #292929; padding: 5px 10px; border-radius: 5px; width: fit-content; border: 1px solid #444; }
        .qty-btn { background: #444; color: white; border: none; width: 26px; height: 26px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: #ffcc00; color: black; }
        .qty-val { min-width: 24px; text-align: center; font-weight: bold; font-size: 1.05em; }
        .qty-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .counter-stack { display: flex; flex-direction: column; gap: 10px; }
        
        .sync-banner { background: #2b1d04; border: 1px solid #ffaa00; color: #ffcc00; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <h1>🏴‍☠️ Crew Shared One Piece Tracker 🏴‍☠️</h1>
    <p class="subtitle">Connected to Google Sheets Database — Updates sync live across all devices</p>

    <div id="syncBanner" class="sync-banner">Saving changes to Google Sheets... 🔄</div>

    <div class="controls-container">
        <input type="text" id="searchBar" placeholder="Search by name, number (e.g., OP01-001)..." onkeyup="filterTable()">
        <div class="btn-group">
            <button id="btnAll" class="active" onclick="setFilter('all')">Show All</button>
            <button id="btnWish" onclick="setFilter('wish')">Wishlist Only 🎯</button>
            <button id="btnOwn" onclick="setFilter('own')">Collection Only 📦</button>
        </div>
    </div>

    <table id="cardTable">
        <thead>
            <tr>
                <th>Photo</th>
                <th>Card Info</th>
                <th>Text / Effects</th>
                <th>TCGplayer Prices</th>
                <th>Our Quantities</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center; padding: 40px;">Loading internal card grid...</td></tr>
        </tbody>
    </table>

    <script>
        const STEIN_API_URL = "https://api.steinhq.com/v1/storages/6a09f07492b1163e97f6144d";

        // Completely self-contained list of key OP-01 cards to avoid external download freezes
        const allCards = [
            { id: "OP01-001", name: "Monkey.D.Luffy (Leader)", card_number: "OP01-001", effect: "[Activate:Main] [Once Per Turn] Give up to 2 Rested DON!! cards to Leader or Character.", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-001.png" },
            { id: "OP01-002", name: "Roronoa Zoro (Leader)", card_number: "OP01-002", effect: "[DON!! x1] All of your Characters gain +1000 power.", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-002.png" },
            { id: "OP01-006", name: "Otama", card_number: "OP01-006", effect: "[On Play] Give up to 1 of your opponent's Characters -2000 power during this turn. [Counter +2000]", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-006.png" },
            { id: "OP01-013", name: "Sanji", card_number: "OP01-013", effect: "[DON!! x2] [Your Turn] This Character gains [Rush].", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-013.png" },
            { id: "OP01-016", name: "Nami", card_number: "OP01-016", effect: "[On Play] Look at 5 cards from the top of your deck; reveal 1 [Straw Hat Crew] card and add it to your hand.", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-016.png" },
            { id: "OP01-025", name: "Roronoa Zoro", card_number: "OP01-025", effect: "[Rush] (This card can attack on the turn it is played.)", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-025.png" },
            { id: "OP01-041", name: "Kozuki Moden", card_number: "OP01-041", effect: "[Double Attack] [Once Per Turn] Set this card as active.", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-041.png" },
            { id: "OP01-070", name: "Donquixote Doflamingo", card_number: "OP01-070", effect: "[Blocker] [On Play] Look at 5 cards from the top of your deck and reorder them.", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-070.png" },
            { id: "OP01-120", name: "Shanks (Secret Rare)", card_number: "OP01-120", effect: "[Rush] [On Play] Your opponent cannot activate [Blocker] during this attack.", image_url: "https://limitlesstcg.s3.amazonaws.com/one-piece/cards/OP01-120.png" }
        ];

        let sharedInventory = {}; 
        let currentFilter = 'all';

        async function initializeApp() {
            if (STEIN_API_URL) {
                try {
                    const sheetResponse = await fetch(STEIN_API_URL);
                    if (sheetResponse.ok) {
                        const sheetData = await sheetResponse.json();
                        if (Array.isArray(sheetData)) {
                            sheetData.forEach(row => {
                                if (row.card_id) {
                                    sharedInventory[row.card_id] = {
                                        owned: parseInt(row.owned) || 0,
                                        needed: parseInt(row.needed) || 0,
                                        rowExists: true
                                    };
                                }
                            });
                        }
                    }
                } catch (sheetErr) {
                    console.error("Sheet sync fallback.", sheetErr);
                }
            }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const query = document.getElementById('searchBar').value.toLowerCase();

            const filteredCards = allCards.filter(card => {
                const cardId = card.card_number || card.id || 'N/A';
                const inv = sharedInventory[cardId] || { owned: 0, needed: 0 };

                const nameMatch = card.name && card.name.toLowerCase().includes(query);
                const idMatch = cardId.toLowerCase().includes(query);
                const matchesSearch = nameMatch || idMatch;

                if (!matchesSearch) return false;

                if (currentFilter === 'wish') return inv.needed > 0;
                if (currentFilter === 'own') return inv.owned > 0;
                return true;
            });

            if (filteredCards.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#aaa;">No cards found.</td></tr>';
                return;
            }

            filteredCards.forEach(card => {
                const cardId = card.card_number || card.id || 'N/A';
                const inv = sharedInventory[cardId] || { owned: 0, needed: 0 };
                
                const row = document.createElement('tr');
                if (inv.owned > 0 || inv.needed > 0) row.className = 'has-items';

                const cleanName = encodeURIComponent(card.name);
                let priceHTML = '<ul class="price-list"><li><a class="tcg-link" href="https://www.tcgplayer.com/search/one-piece-card-game/product?q=' + cleanName + '" target="_blank">🔍 View Live Prices</a></li></ul>';

                row.innerHTML = '<td><img class="card-img" src="' + card.image_url + '" onerror="this.onerror=null; this.src='https://via.placeholder.com/80x110?text=OP+Card';" alt="' + card.name + '"></td>' +
                                '<td><div style="font-size:1.1em; font-weight:bold; color:#fff;">' + card.name + '</div><div style="color:#ffcc00; margin-top:4px; font-family:monospace; font-size:1em;">' + cardId + '</div></td>' +
                                '<td style="color:#ddd; font-size:0.95em; max-width:400px;">' + card.effect + '</td>' +
                                '<td>' + priceHTML + '</td>' +
                                '<td>' +
                                '   <div class="counter-stack">' +
                                '       <div>' +
                                '           <div class="qty-label">We Have</div>' +
                                '           <div class="qty-controls">' +
                                '               <button class="qty-btn" onclick="updateQty('' + cardId + '', 'owned', -1)">-</button>' +
                                '               <div class="qty-val">' + inv.owned + '</div>' +
                                '               <button class="qty-btn" onclick="updateQty('' + cardId + '', 'owned', 1)">+</button>' +
                                '           </div>' +
                                '       </div>' +
                                '       <div>' +
                                '           <div class="qty-label">We Need</div>' +
                                '           <div class="qty-controls">' +
                                '               <button class="qty-btn" onclick="updateQty('' + cardId + '', 'needed', -1)">-</button>' +
                                '               <div class="qty-val">' + inv.needed + '</div>' +
                                '               <button class="qty-btn" onclick="updateQty('' + cardId + '', 'needed', 1)">+</button>' +
                                '           </div>' +
                                '       </div>' +
                                '   </div>' +
                                '</td>';

                tbody.appendChild(row);
            });
        }

        async function updateQty(cardId, field, amount) {
            if (!sharedInventory[cardId]) {
                sharedInventory[cardId] = { owned: 0, needed: 0, rowExists: false };
            }

            let newVal = sharedInventory[cardId][field] + amount;
            if (newVal < 0) newVal = 0;
            sharedInventory[cardId][field] = newVal;

            renderTable();

            if (!STEIN_API_URL) return;

            const banner = document.getElementById("syncBanner");
            banner.style.display = "block";

            try {
                const isUpdate = sharedInventory[cardId].rowExists;
                
                if (isUpdate) {
                    await fetch(STEIN_API_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            condition: { card_id: cardId },
                            set: { 
                                owned: sharedInventory[cardId].owned.toString(), 
                                needed: sharedInventory[cardId].needed.toString() 
                            }
                        })
                    });
                } else {
                    const response = await fetch(STEIN_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify([{
                            card_id: cardId,
                            owned: sharedInventory[cardId].owned.toString(),
                            needed: sharedInventory[cardId].needed.toString()
                        }])
                    });
                    if (response.ok) sharedInventory[cardId].rowExists = true;
                }
            } catch (err) {
                console.error("Cloud error:", err);
            } finally {
                banner.style.display = "none";
            }
        }

        function filterTable() {
            renderTable();
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
            if (filterType === 'all') document.getElementById('btnAll').classList.add('active');
            if (filterType === 'wish') document.getElementById('btnWish').classList.add('active');
            if (filterType === 'own') document.getElementById('btnOwn').classList.add('active');
            renderTable();
        }

        initializeApp();
    </script>
</body>
</html>
